version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: practice_pulse_db
    environment:
      POSTGRES_USER: practice_pulse
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: practice_pulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practice_pulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: practice_pulse_api
    environment:
      DATABASE_URL: postgresql://practice_pulse:dev_password@postgres:5432/practice_pulse
      DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: practice_pulse_web
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:

networks:
  default:
    name: practice_pulse_network
